<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>PlanB - Login</title>
    <link rel="stylesheet" href="css/global.css" />

    <link rel="stylesheet" href="css/loginStyle.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>

  <body>
    <div class="mobile-container">
      <div class="auth-content">
        <img src="pic/Group new.svg" class="login-logo" alt="PlanB Logo" />
        <p class="slogan-text">Plans change. We’ve got you</p>
        <h1 class="welcome-title">יאללה, בואו נתחיל</h1>

        <form style="width: 100%" onsubmit="handleLogin(event)">
          <div class="input-group">
            <div class="glass-input">
              <input type="email" id="email" placeholder="אימייל" autocomplete="email" />
            </div>

            <div class="glass-input">
              <input type="password" id="password" placeholder="סיסמה" autocomplete="current-password" />
              <i class="far fa-eye-slash eye-icon"></i>
            </div>
          </div>

          <div class="forgot-container">
            שכחת סיסמא? לא נורא,
            <a href="#" class="forgot-text"> נשחזר כאן</a>
          </div>

          <button
            type="submit"
            class="login-btn"
            
          >
            התחברות
          </button>
        </form>

        <div class="divider">
          <div class="line"></div>
          <span class="divider-text">או באמצעות</span>
          <div class="line"></div>
        </div>

        <div class="social-row">
          <div
            class="social-btn google"
            onclick="window.location.href = 'home.html'"
          >
            <i class="fab fa-google"></i>
          </div>
          <div
            class="social-btn facebook"
            onclick="window.location.href = 'home.html'"
          >
            <i class="fab fa-facebook-f"></i>
          </div>
        </div>

        <div class="footer-links">
          <div class="no-account">
            אין לך חשבון?
            <a href="signup.html" class="signup-link">מצטרפים כאן</a>
          </div>
          <a href="home.html" class="guest-link">המשך כאורח</a>
        </div>
      </div>
    </div>
      <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/mockData.js"></script>
  <script src="js/pages/loginPage.js"></script>
  <div id="toast" class="toast"><i class="fas fa-exclamation-circle"></i> <span id="toastMsg"></span></div>

<style>
.toast {
  position: fixed;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 71, 87, 0.92);
  backdrop-filter: blur(12px);
  color: #fff;
  padding: 14px 24px;
  border-radius: 16px;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 9999;
  box-shadow: 0 8px 24px rgba(255,71,87,0.35);
  transition: top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap;
}
.toast.show { top: 24px; }
</style>

</body>
</html>
