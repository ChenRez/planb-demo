<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PlanB - יצירת חשבון</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/signupStyle.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>

  <body>
    <div class="mobile-container">
      <div class="close-btn-wrapper">
        <div class="close-btn" onclick="window.location.href = 'login.html'">
          <i class="fas fa-times"></i>
        </div>
      </div>

      <div class="header-section">
        <img src="pic/Group.svg" alt="PlanB Logo" class="logo-image" />
        <h1 class="page-title">יצירת חשבון</h1>
        <p class="page-subtitle">בואו נתחיל, זה ייקח רק רגע</p>
      </div>

      <form class="signup-form" id="signupForm">
        <div class="row">
          <div class="input-group">
            <i class="far fa-user input-icon"></i>
            <input
              type="text"
              id="firstName"
              placeholder="שם פרטי"
              class="glass-input"
              required
            />
          </div>
          <div class="input-group">
            <input
              type="text"
              id="lastName"
              placeholder="שם משפחה"
              class="glass-input"
              required
            />
          </div>
        </div>

        <div class="input-group">
          <i class="far fa-envelope input-icon"></i>
          <input
            type="email"
            id="email"
            placeholder="אימייל"
            class="glass-input"
            required
          />
        </div>

        <div class="input-group">
          <i class="fas fa-phone input-icon"></i>
          <input
            type="tel"
            id="phone"
            inputmode="numeric"
            maxlength="10"
            placeholder="מספר טלפון (נייד)"
            class="glass-input"
            required
          />
        </div>

        <div class="input-group" id="cityGroup">
          <i class="fas fa-map-marker-alt input-icon"></i>
          <input
            type="text"
            id="city"
            placeholder="עיר מגורים"
            class="glass-input"
            autocomplete="off"
          />
          <input type="hidden" id="cityId" />
          <ul id="citySuggestions" class="city-suggestions"></ul>
        </div>

        <div class="input-group password-field">
          <i class="fas fa-lock input-icon"></i>
          <input
            type="password"
            id="password"
            placeholder="סיסמה"
            class="glass-input"
            required
          />
          <button type="button" class="toggle-password" tabindex="-1"><i class="far fa-eye-slash"></i></button>
        </div>

        <div class="input-group password-field">
          <i class="fas fa-lock input-icon"></i>
          <input
            type="password"
            id="confirmPassword"
            placeholder="אימות סיסמה"
            class="glass-input"
            required
          />
          <button type="button" class="toggle-password" tabindex="-1"><i class="far fa-eye-slash"></i></button>
        </div>

        <div class="preferences-link-area">
          <p class="pref-title">בא לנו להכיר אותך באמת</p>
          <p class="pref-subtitle">כדי לקלוע בול</p>
          <button
            type="button"
            class="glass-btn-secondary pulse-animation"
            onclick="goToPreferences()"
          >
            <i class="fas fa-magic"></i> יאללה, תלמדו את הטעם שלי
          </button>
        </div>

        <button type="submit" class="submit-btn">יצירת חשבון</button>

        <div class="login-link">
          כבר יש לך חשבון? <a href="login.html">התחברות</a>
        </div>
      </form>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/services/citiesService.js"></script>
    <script src="js/pages/signupPage.js"></script>
  </body>
</html>
