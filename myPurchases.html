<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>PlanB - הרכישות שלי</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/global.css" />

    <link rel="stylesheet" href="css/myPurchasesStyle.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <div class="mobile-container">
      <div class="header-simple">
        <div class="back-btn" onclick="window.location.href = 'home.html'">
          <span class="material-symbols-rounded">arrow_forward</span>
        </div>
        <h1 class="page-title">הרכישות שלי</h1>
      </div>

      <div class="scroll-content">
        <div class="stats-row">
          <div class="stat-card">
            <span class="stat-num">₪0</span>
            <span class="stat-label">סה"כ הוצאות</span>
          </div>
          <div class="stat-card">
            <span class="stat-num">0</span>
            <span class="stat-label">כרטיסים שרכשת</span>
          </div>
          <div class="stat-card">
            <span class="stat-num">0</span>
            <span class="stat-label">עסקאות הושלמו</span>
          </div>
        </div>

        <h3 class="section-title">היסטוריית רכישות</h3>

        <div class="purchases-list">
          <div class="purchase-item">
            <div class="purchase-img-wrap">
              <img src="pic/noakirel.jpg" class="purchase-thumb" />
            </div>

            <div class="purchase-info">
              <span class="purchase-title">נועה קירל בפארק</span>
              <div class="purchase-meta">
                <i class="far fa-calendar-alt"></i> 7 ביוני, 2026 | 20:00
              </div>
              <div class="purchase-meta sub-meta">נרכש מיוסי לוי</div>
            </div>

            <div class="purchase-status-col">
              <div class="purchase-price">250₪</div>
              <span class="status-badge ready">מוכן לשימוש</span>
              <button class="ticket-action-btn">הצג כרטיס</button>
            </div>
          </div>

          <div class="purchase-item grayscale">
            <div class="purchase-img-wrap">
              <img
                src="https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?w=200"
                class="purchase-thumb"
              />
            </div>

            <div class="purchase-info">
              <span class="purchase-title">קולדפליי בפריז</span>
              <div class="purchase-meta">
                <i class="far fa-check-circle"></i> מומש ב-12/01/2026
              </div>
              <div class="purchase-meta sub-meta">נרכש מדניאל כהן</div>
            </div>

            <div class="purchase-status-col">
              <div class="purchase-price">900₪</div>
              <span
                class="rate-seller-btn"
                onclick="alert('פתיחת חלון דירוג...')"
              >
                <i class="fas fa-star"></i> דרג מוכר
              </span>
            </div>
          </div>

          <div class="purchase-item">
            <div class="purchase-img-wrap">
              <img
                src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=200"
                class="purchase-thumb"
              />
            </div>

            <div class="purchase-info">
              <span class="purchase-title">ארוחה זוגית</span>
              <div class="purchase-meta">
                <i class="far fa-clock"></i> בתוקף עד 31/12/2026
              </div>
            </div>

            <div class="purchase-status-col">
              <div class="purchase-price">300₪</div>
              <span class="status-badge valid">בתוקף</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Modal: פתיחת מחלוקת -->
    <div class="modal-overlay" id="disputeModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
      <div class="modal-card" style="background:#fff; border-radius:20px; padding:24px; margin:20px; width:100%; max-width:380px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
          <h3 style="margin:0; font-size:17px;">פתיחת מחלוקת</h3>
          <button onclick="closeDisputeModal()" style="background:none; border:none; font-size:22px; cursor:pointer; color:#666;">×</button>
        </div>
        <p id="disputeModalDesc" style="font-size:13px; color:#666; margin-bottom:16px;"></p>
        <div style="margin-bottom:14px;">
          <label style="font-size:13px; font-weight:600; display:block; margin-bottom:6px;">סוג הבעיה</label>
          <select id="disputeType" style="width:100%; padding:10px 12px; border:1.5px solid #e0e0e0; border-radius:10px; font-size:14px; font-family:inherit;">
            <option value="not_transferred">הכרטיס לא הועבר</option>
            <option value="not_valid">הכרטיס לא תקין / לא תואם לפרסום</option>
            <option value="payment_issue">בעיה בתשלום / החזר</option>
            <option value="other">אחר</option>
          </select>
        </div>
        <div style="margin-bottom:18px;">
          <label style="font-size:13px; font-weight:600; display:block; margin-bottom:6px;">תיאור הבעיה</label>
          <textarea id="disputeDesc" rows="4" placeholder="תאר את הבעיה בפירוט..." style="width:100%; padding:10px 12px; border:1.5px solid #e0e0e0; border-radius:10px; font-size:14px; font-family:inherit; resize:none; box-sizing:border-box;"></textarea>
        </div>
        <p id="disputeError" style="color:#ff4757; font-size:13px; font-weight:600; margin-bottom:10px; display:none;"></p>
        <button onclick="submitDispute()" style="width:100%; padding:14px; background:linear-gradient(135deg,#ed5f65,#b34467); color:#fff; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer;">
          שלח מחלוקת
        </button>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/services/transactionService.js"></script>
    <script src="js/services/disputeService.js"></script>
    <script src="js/pages/myPurchasesPage.js"></script>
  </body>
</html>
