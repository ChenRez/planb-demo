<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>PlanB - מועדפים</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/global.css" />

    <link rel="stylesheet" href="css/favoritesStyle.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <div class="mobile-container">
      <header class="top-bar">
        <h3>
          המועדפים שלי
          <i class="fas fa-heart" style="color: #ff4757; margin-right: 5px"></i>
        </h3>
      </header>

      <div class="scroll-content">
        <div id="favList" class="fav-list"></div>
      </div>

      <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='home.html'">
          <span class="material-symbols-rounded nav-icon">home</span
          ><span class="nav-label">בית</span>
        </button>
        <button class="nav-item active">
          <span class="material-symbols-rounded nav-icon">favorite</span
          ><span class="nav-label">מועדפים</span>
        </button>
        <button class="nav-item" onclick="window.location.href='newSell.html'">
          <div class="inline-circle-btn">
            <span class="material-symbols-rounded">add</span>
          </div>
          <span
            class="nav-label"
            style="font-weight: 700; color: var(--text-main)"
            >מכירה</span
          >
        </button>
        <button class="nav-item" onclick="window.location.href='search.html'">
          <span class="material-symbols-rounded nav-icon">search</span
          ><span class="nav-label">חיפוש</span>
        </button>
        <button class="nav-item" onclick="window.location.href='profile.html'">
          <span class="material-symbols-rounded nav-icon">person</span
          ><span class="nav-label">פרופיל</span>
        </button>
      </nav>
    </div>
      <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/pages/favoritesPage.js"></script>
  </body>
